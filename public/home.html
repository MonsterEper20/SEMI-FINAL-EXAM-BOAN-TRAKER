<!DOCTYPE html>
<html>
<head>
  <title>BaonTracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <h1><span class="accent">Baon</span>Tracker</h1>
</header>

<section class="card">
  <h2>+ NEW SAVINGS GOAL</h2>
  <div class="goal-form">
    <input id="goal" placeholder="Goal name">
    <input id="amount" type="number" placeholder="Target amount">
    <button onclick="addGoal()">Add</button>
  </div>
</section>

<p id="statusMessage"></p>

<section class="card">
  <h3>SUMMARY</h3>
  <div class="summary">
    <div class="summary-box"><p>Total Goals</p><h2 id="totalGoals">0</h2></div>
    <div class="summary-box"><p>Total Saved</p><h2 id="totalSaved">₱0</h2></div>
    <div class="summary-box"><p>Total Target</p><h2 id="totalTarget">₱0</h2></div>
    <div class="summary-box"><p>Progress</p><h2 id="overallProgress">0%</h2></div>
  </div>
</section>

<section class="card">
  <h3>MY GOALS</h3>
  <div id="goalsList"></div>
</section>

<script>
const API = "";

function show(msg, err=false){
  const el = document.getElementById("statusMessage");
  el.innerText = msg;
  el.style.color = err ? "red" : "lime";
  setTimeout(()=>el.innerText="",3000);
}

async function loadGoals(){
  const res = await fetch(API+"/goals");
  const data = await res.json();

  let totalSaved=0, totalTarget=0;

  const list = document.getElementById("goalsList");
  list.innerHTML="";

  data.forEach(g=>{
    totalSaved+=g.currentAmount;
    totalTarget+=g.targetAmount;

    list.innerHTML+=`
      <div class="goal-item">
        <div class="goal-header">
          <b>${g.name}</b>
          <span>₱${g.currentAmount} / ₱${g.targetAmount}</span>
        </div>

        <div class="progress-bar">
          <div class="progress" style="width:${g.progressPercent}%"></div>
        </div>

        <div class="add-save">
          <input id="save-${g.id}" type="number" placeholder="amount">
          <button onclick="addMoney(${g.id})">+ Add</button>
          <button onclick="delGoal(${g.id})">Delete</button>
        </div>
      </div>`;
  });

  document.getElementById("totalGoals").innerText=data.length;
  document.getElementById("totalSaved").innerText="₱"+totalSaved;
  document.getElementById("totalTarget").innerText="₱"+totalTarget;
  document.getElementById("overallProgress").innerText=
    totalTarget?Math.round(totalSaved/totalTarget*100)+"%":"0%";
}

async function addGoal(){
  const name=document.getElementById("goal").value;
  const targetAmount=Number(document.getElementById("amount").value);

  const res=await fetch(API+"/goals",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,targetAmount})
  });

  const data=await res.json();
  if(!res.ok) return show(data.error,true);

  show("Goal added");
  loadGoals();
}

async function addMoney(id){
  const amount=Number(document.getElementById(`save-${id}`).value);

  const res=await fetch(API+`/goals/${id}/contribute`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({amount})
  });

  const data=await res.json();
  if(!res.ok) return show(data.error,true);

  show("Added");
  loadGoals();
}

async function delGoal(id){
  const res=await fetch(API+`/goals/${id}`,{method:"DELETE"});
  const data=await res.json();

  if(!res.ok) return show(data.error,true);

  show("Deleted");
  loadGoals();
}

loadGoals();
</script>

</body>
</html>
