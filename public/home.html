<!DOCTYPE html>
<html>
<head>
  <title>BaonTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1><span class="accent">Baon</span>Tracker</h1>
</header>

<!-- GOALS -->
<section class="card">
  <h2>NEW GOAL</h2>
  <input id="goal" placeholder="Goal name">
  <input id="amount" type="number" placeholder="Target amount">
  <button onclick="addGoal()">Add Goal</button>
</section>

<!-- WEEK -->
<section class="card">
  <h2>WEEKLY LOG</h2>
  <input id="weekLabel" placeholder="Week label">
  <input id="allowance" type="number" placeholder="Allowance">
  <input id="spent" type="number" placeholder="Spent">
  <input id="saveTarget" type="number" placeholder="Save target">
  <button onclick="addWeek()">Add Week</button>
</section>

<!-- SUMMARY -->
<section class="card">
  <h3>SUMMARY</h3>

  <div class="summary">
    <div class="summary-box"><p>Weeks</p><h2 id="totalWeeks">0</h2></div>
    <div class="summary-box"><p>Allowance</p><h2 id="totalAllowance">₱0</h2></div>
    <div class="summary-box"><p>Spent</p><h2 id="totalSpent">₱0</h2></div>
    <div class="summary-box"><p>Saved</p><h2 id="totalSaved">₱0</h2></div>
    <div class="summary-box"><p>Met</p><h2 id="weeksMetTarget">0</h2></div>
    <div class="summary-box"><p>Missed</p><h2 id="weeksMissed">0</h2></div>
  </div>
</section>

<!-- GOALS LIST -->
<section class="card">
  <h3>GOALS</h3>
  <div id="goalList"></div>
</section>

<!-- WEEK LIST -->
<section class="card">
  <h3>WEEK LOGS</h3>
  <div id="weekList"></div>
</section>

<script>
async function loadAll(){
  loadGoals();
  loadWeeks();
  loadSummary();
}

// ================= GOALS =================
async function loadGoals(){
  const res = await fetch("/goals");
  const data = await res.json();

  const list = document.getElementById("goalList");
  list.innerHTML = "";

  data.forEach(g=>{
    list.innerHTML += `
      <div class="goal-item">
        <b>${g.name}</b>
        <p>₱${g.currentAmount} / ₱${g.targetAmount}</p>

        <input id="g-${g.id}" type="number">
        <button onclick="addMoney(${g.id})">Add</button>
        <button onclick="deleteGoal(${g.id})">Delete</button>
      </div>
    `;
  });
}

async function addGoal(){
  const name = goal.value;
  const targetAmount = Number(amount.value);

  await fetch("/goals", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({name, targetAmount})
  });

  loadAll();
}

async function addMoney(id){
  const amount = Number(document.getElementById(`g-${id}`).value);

  await fetch(`/goals/${id}/contribute`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({amount})
  });

  loadAll();
}

async function deleteGoal(id){
  await fetch(`/goals/${id}`, { method:"DELETE" });
  loadAll();
}

// ================= WEEKS =================
async function loadWeeks(){
  const res = await fetch("/weeks");
  const data = await res.json();

  const list = document.getElementById("weekList");
  list.innerHTML = "";

  data.forEach(w=>{
    list.innerHTML += `
      <div class="goal-item">
        <b>${w.weekLabel}</b>
        <p>Allowance: ₱${w.allowance}</p>
        <p>Spent: ₱${w.spent}</p>
        <p>Saved: ₱${w.saved}</p>
        <p>${w.metTarget ? "✅ Met" : "❌ Missed"}</p>
      </div>
    `;
  });
}

async function addWeek(){
  const weekLabel = document.getElementById("weekLabel").value;
  const allowance = Number(document.getElementById("allowance").value);
  const spent = Number(document.getElementById("spent").value);
  const saveTarget = Number(document.getElementById("saveTarget").value);

  await fetch("/weeks", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({weekLabel, allowance, spent, saveTarget})
  });

  loadAll();
}

// ================= SUMMARY =================
async function loadSummary(){
  const res = await fetch("/summary/all");
  const d = await res.json();

  totalWeeks.innerText = d.totalWeeks;
  totalAllowance.innerText = "₱"+d.totalAllowance;
  totalSpent.innerText = "₱"+d.totalSpent;
  totalSaved.innerText = "₱"+d.totalSaved;
  weeksMetTarget.innerText = d.weeksMetTarget;
  weeksMissed.innerText = d.weeksMissed;
}

loadAll();
</script>

</body>
</html>
